<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ceritakan yang kamu rasakan — Perpustakaan Ebook</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body class="quiz-page-body">

<main class="quiz-shell">
  <div class="quiz-view" id="quiz-view"></div>
</main>

<script src="assets/app.js"></script>
<script src="assets/quiz.js"></script>
<script>
async function main() {
  const cfg = await loadConfig();
  document.title = `Ceritakan yang kamu rasakan — ${cfg.site.name}`;

  if (!cfg.quiz || !cfg.quiz.enabled) {
    document.getElementById("quiz-view").innerHTML =
      '<p style="text-align:center; padding:2rem 0;">Obrolan singkat belum tersedia. <a href="index.html">Kembali ke beranda</a></p>';
    return;
  }

  new QuizController(cfg, "quiz-view");
}

main();
</script>
</body>
</html>
